# Rustlux Security — modules blacklisted by default.
#
#  Disabling modules that are vunerable and no everyone use it.
#  if you need something, comment the section that you need.
#
# reference: (CVE-2026-43284, CVE-2026-43500)

# xfrm-ESP: (CVE-2026-43284)
# necessary for: VPNs IPsec (strongSwan, libreswan)
# comment if you use this
install esp4 /bin/false
install esp6 /bin/false

# RxRPC: (CVE-2026-43500)
# necessary for: AFS (Andrew File System), Kerberos
# no much ppl use it
install rxrpc /bin/false

# algif_aead: (CVE-2026-31431)
# necessary for: crypto userspace using AF_ALG with AEAD
# the use in desktop is weird:
install algif_aead /bin/false

# other modules with historial of being vunerable:
# uncomment if you need it.
install dccp /bin/false
install sctp /bin/false
install rds /bin/false
install tipc /bin/false
