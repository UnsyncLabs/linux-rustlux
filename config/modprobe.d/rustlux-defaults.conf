# Rustlux Defaults — configuración de módulos por defecto
#
# I/O Scheduler: BFQ for devices single-queue, mq-deadline for multi-queue
# (inspired in CachyOS CONFIG_CACHY)
options bfq low_latency=1

# Networking: deshabilitar TCP simultaneous connect (patch hardened)
# Previene ataques de denegación de conexión
# Nota: esto se controla via sysctl, no modprobe:
#   net.ipv4.tcp_simult_connect = 0
