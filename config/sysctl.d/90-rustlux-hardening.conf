# Rustlux Hardening — sysctl defaults applied at boot
# Install to: /etc/sysctl.d/90-rustlux-hardening.conf

# ── Kernel ───────────────────────────────────────────────────────────────────

# Restrict perf_event to maximum (only root with CAP_PERFMON)
kernel.perf_event_paranoid = 3

# Restrict access to dmesg (requires CAP_SYSLOG)
kernel.dmesg_restrict = 1

# Hide kernel pointers in /proc (kptr_restrict)
kernel.kptr_restrict = 2

# Disable SysRq (or limit to sync+reboot: 176)
kernel.sysrq = 0

# Restrict ptrace (only parent can trace child)
kernel.yama.ptrace_scope = 2

# Disable module loading after boot (optional, uncomment if not using DKMS)
# kernel.modules_disabled = 1

# ── Filesystem ───────────────────────────────────────────────────────────────

# Protect symlinks/hardlinks (prevents race conditions in /tmp)
fs.protected_symlinks = 1
fs.protected_hardlinks = 1

# Protect FIFOs and regular files in sticky directories
fs.protected_fifos = 2
fs.protected_regular = 2

# ── Networking ───────────────────────────────────────────────────────────────

# Disable IP forwarding (we are not a router)
net.ipv4.ip_forward = 0

# Ignore ICMP redirects (prevents MITM)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Do not send ICMP redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Enable reverse path filtering (anti-spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Protect against SYN flood
net.ipv4.tcp_syncookies = 1

# Ignore ICMP echo broadcasts (anti-smurf)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Log martian packets (packets with impossible source address)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Disable TCP simultaneous connect (hardened patch)
net.ipv4.tcp_simult_connect = 0

# ── Memory ───────────────────────────────────────────────────────────────────

# Maximum ASLR
kernel.randomize_va_space = 2

# Restrict access to /proc/kallsyms and /proc/kcore
kernel.perf_event_max_sample_rate = 1

# Restrict unprivileged user namespaces (prevents sandbox escapes)
# Uncomment if not using Flatpak/containers without root:
# kernel.unprivileged_userns_clone = 0

# Restrict BPF (prevents exploits via eBPF)
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2
