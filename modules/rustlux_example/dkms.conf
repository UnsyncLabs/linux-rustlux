# DKMS configuration for rustlux_example
# Este archivo permite que DKMS compile y gestione el módulo automáticamente
# cuando se actualiza el kernel.
#
# Instalar con DKMS:
#   sudo dkms add ./modules/rustlux_example
#   sudo dkms build rustlux_example/0.1.0
#   sudo dkms install rustlux_example/0.1.0

PACKAGE_NAME="rustlux_example"
PACKAGE_VERSION="0.1.0"

# Módulo a compilar
BUILT_MODULE_NAME[0]="rustlux_example"
DEST_MODULE_LOCATION[0]="/extra"

# Comando de build (usa el Makefile del módulo)
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"

# Comando de limpieza
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Autoinstalar cuando se actualiza el kernel
AUTOINSTALL="yes"
